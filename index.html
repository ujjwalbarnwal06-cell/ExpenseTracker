<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Finance Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;background:#0d0d0f;color:#e8e8ea;min-height:100vh}
/* Login screen */
#loginScreen{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:1.5rem}
.login-box{background:#18181c;border:0.5px solid #2a2a30;border-radius:20px;padding:2.5rem 2rem;width:100%;max-width:360px;text-align:center}
.login-logo{font-size:32px;margin-bottom:1rem}
.login-title{font-size:20px;font-weight:500;color:#e8e8ea;margin-bottom:6px}
.login-sub{font-size:13px;color:#444;margin-bottom:2rem}
.login-box input{background:#111;border:0.5px solid #333;border-radius:10px;padding:12px 16px;color:#e8e8ea;font-size:15px;outline:none;width:100%;text-align:center;letter-spacing:2px;margin-bottom:12px}
.login-box input:focus{border-color:#7F77DD}
.btn-login{width:100%;background:#7F77DD;border:none;border-radius:10px;padding:12px;color:#fff;font-size:15px;font-weight:500;cursor:pointer;margin-bottom:8px}
.btn-login:hover{background:#6a63c4}
.login-error{font-size:13px;color:#f87171;min-height:20px;margin-top:4px}
/* Dashboard */
#dashboard{display:none;padding:1.5rem}
h1{font-size:22px;font-weight:500}
.sub{font-size:13px;color:#555;margin-top:3px}
.header{display:flex;justify-content:space-between;align-items:center;margin-bottom:1.5rem;gap:10px;flex-wrap:wrap}
.header-right{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.btn-add{background:#7F77DD;border:none;border-radius:10px;padding:10px 20px;color:#fff;font-size:14px;font-weight:500;cursor:pointer}
.btn-add:hover{background:#6a63c4}
.btn-lock{border:0.5px solid #333;border-radius:10px;padding:9px 14px;font-size:13px;cursor:pointer;background:transparent;display:flex;align-items:center;gap:5px}
.btn-lock.locked{color:#555;border-color:#333}
.btn-lock.locked:hover{border-color:#7F77DD;color:#7F77DD}
.btn-lock.unlocked{color:#4ade80;border-color:#2a4a2a}
.btn-logout{border:0.5px solid #333;border-radius:10px;padding:9px 14px;font-size:13px;cursor:pointer;background:transparent;color:#555}
.btn-logout:hover{border-color:#f87171;color:#f87171}
.badge{font-size:11px;padding:3px 10px;border-radius:20px;font-weight:500}
.badge.view{background:#1a1a1a;color:#444;border:0.5px solid #222}
.badge.edit{background:#1a3a1a;color:#4ade80;border:0.5px solid #2a4a2a}
.cards{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:1.5rem}
.card{background:#18181c;border-radius:12px;padding:1rem 1.25rem;border:0.5px solid #2a2a30}
.card-label{font-size:12px;color:#555;margin-bottom:6px}
.card-val{font-size:24px;font-weight:500}
.charts{display:grid;grid-template-columns:2fr 1fr;gap:12px;margin-bottom:1.5rem}
.chart-box{background:#18181c;border-radius:12px;padding:1rem 1.25rem;border:0.5px solid #2a2a30}
.chart-title{font-size:14px;font-weight:500;color:#aaa;margin-bottom:.75rem}
.legend-row{display:flex;flex-wrap:wrap;gap:10px;margin-top:8px}
.legend-item{display:flex;align-items:center;gap:4px;font-size:11px;color:#888}
.legend-dot{width:8px;height:8px;border-radius:2px;flex-shrink:0}
.tx-section{background:#18181c;border-radius:12px;padding:1rem 1.25rem;border:0.5px solid #2a2a30}
.tx-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem;flex-wrap:wrap;gap:8px}
.filters{display:flex;gap:6px}
.chip{padding:4px 12px;border-radius:20px;font-size:12px;cursor:pointer;border:0.5px solid #333;background:transparent;color:#666}
.chip.active{background:#7F77DD;color:#fff;border-color:#7F77DD}
.tx-row{display:flex;justify-content:space-between;align-items:flex-start;padding:10px 0;border-bottom:0.5px solid #1e1e22;cursor:pointer}
.tx-row:last-child{border-bottom:none}
.tx-row:hover{background:rgba(255,255,255,0.02);border-radius:8px;padding-left:6px;padding-right:6px}
.tx-left{display:flex;gap:10px;align-items:flex-start;flex:1}
.tx-dot{width:8px;height:8px;border-radius:50%;margin-top:6px;flex-shrink:0}
.tx-title{font-size:14px;color:#ddd;font-weight:500}
.tx-meta{font-size:12px;color:#555;margin-top:2px}
.tx-detail-text{font-size:11px;color:#555;margin-top:3px;font-style:italic;line-height:1.5}
.tx-amt{font-size:14px;font-weight:500;white-space:nowrap;margin-left:12px}
.btn-icon{background:transparent;border:0.5px solid #2a2a30;border-radius:6px;padding:4px 8px;color:#666;cursor:pointer;font-size:11px}
.btn-icon:hover{border-color:#7F77DD;color:#7F77DD}
.btn-icon.del:hover{border-color:#f87171;color:#f87171}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.8);display:flex;align-items:center;justify-content:center;z-index:999}
.modal{background:#18181c;border-radius:16px;padding:1.5rem;width:100%;max-width:420px;border:0.5px solid #333;max-height:90vh;overflow-y:auto}
.modal-title{font-size:18px;font-weight:500;margin-bottom:1.25rem;color:#e8e8ea}
.type-row{display:flex;gap:8px;margin-bottom:14px}
.type-btn{flex:1;padding:9px;border-radius:8px;border:0.5px solid #333;cursor:pointer;font-size:14px;font-weight:500;background:#111;color:#666}
.type-btn.active-exp{background:#3a1a1a;color:#f87171;border-color:#f87171}
.type-btn.active-inc{background:#1a3a1a;color:#4ade80;border-color:#4ade80}
.form-row{margin-bottom:14px}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
label{display:block;font-size:12px;color:#888;margin-bottom:5px}
input,select,textarea{width:100%;background:#111;border:0.5px solid #333;border-radius:8px;padding:9px 12px;color:#e8e8ea;font-size:14px;outline:none;font-family:inherit}
input:focus,select:focus,textarea:focus{border-color:#7F77DD}
select option{background:#18181c}
textarea{resize:vertical;min-height:72px;line-height:1.5}
.detail-toggle{display:flex;align-items:center;gap:6px;cursor:pointer;margin-bottom:8px;user-select:none}
.detail-arrow{font-size:10px;color:#7F77DD;transition:transform 0.2s;display:inline-block}
.detail-arrow.open{transform:rotate(90deg)}
.detail-lbl{font-size:12px;color:#7F77DD}
.modal-btns{display:flex;gap:8px;margin-top:1rem}
.btn-cancel{flex:1;background:transparent;border:0.5px solid #333;border-radius:8px;padding:10px;color:#888;font-size:14px;cursor:pointer}
.btn-cancel:hover{border-color:#555;color:#aaa}
.btn-save{flex:2;background:#7F77DD;border:none;border-radius:8px;padding:10px;color:#fff;font-size:14px;font-weight:500;cursor:pointer}
.btn-save:hover{background:#6a63c4}
.empty{color:#333;font-size:14px;text-align:center;padding:3rem 1rem}
.pin-error{text-align:center;font-size:13px;color:#f87171;min-height:20px;margin-top:6px}
@media(max-width:640px){.cards{grid-template-columns:1fr 1fr}.card-val{font-size:18px}.charts{grid-template-columns:1fr}.header{flex-direction:column;align-items:flex-start}}
</style>
</head>
<body>

<!-- LOGIN SCREEN -->
<div id="loginScreen">
  <div class="login-box">
    <div class="login-logo">💰</div>
    <div class="login-title">Finance Dashboard</div>
    <div class="login-sub">Enter password to view</div>
    <input id="viewPassInput" type="password" placeholder="Password" onkeydown="if(event.key==='Enter')tryLogin()"/>
    <button class="btn-login" onclick="tryLogin()">Enter</button>
    <div class="login-error" id="loginError"></div>
  </div>
</div>

<!-- DASHBOARD (hidden until login) -->
<div id="dashboard">
  <div class="header">
    <div><h1>Finance Dashboard</h1><p class="sub" id="modeSub">View only mode</p></div>
    <div class="header-right">
      <span class="badge view" id="modeBadge">View only</span>
      <button class="btn-lock locked" id="lockBtn" onclick="handleLock()">🔒 Unlock</button>
      <button class="btn-add" id="addBtn" style="display:none" onclick="openModal()">+ Add</button>
      <button class="btn-logout" onclick="logout()">Logout</button>
    </div>
  </div>

  <div class="cards">
    <div class="card"><div class="card-label">Total Balance</div><div class="card-val" id="bal">₹0</div></div>
    <div class="card"><div class="card-label">Total Income</div><div class="card-val" style="color:#4ade80" id="inc">₹0</div></div>
    <div class="card"><div class="card-label">Total Expenses</div><div class="card-val" style="color:#f87171" id="exp">₹0</div></div>
  </div>

  <div class="charts">
    <div class="chart-box">
      <div class="chart-title">Monthly overview — all 12 months</div>
      <div class="legend-row">
        <span class="legend-item"><span class="legend-dot" style="background:#4ade80"></span>Income</span>
        <span class="legend-item"><span class="legend-dot" style="background:#f87171"></span>Expenses</span>
      </div>
      <div style="position:relative;width:100%;height:220px;margin-top:8px"><canvas id="barChart"></canvas></div>
    </div>
    <div class="chart-box">
      <div class="chart-title">Expenses by category</div>
      <div style="position:relative;width:100%;height:160px"><canvas id="pieChart"></canvas></div>
      <div class="legend-row" id="pieLegend"></div>
    </div>
  </div>

  <div class="tx-section">
    <div class="tx-header">
      <div style="font-size:14px;font-weight:500;color:#aaa">Transactions</div>
      <div class="filters">
        <button class="chip active" onclick="setFilter('All',this)">All</button>
        <button class="chip" onclick="setFilter('income',this)">Income</button>
        <button class="chip" onclick="setFilter('expense',this)">Expenses</button>
      </div>
    </div>
    <div id="txList"></div>
  </div>
</div>

<!-- EDIT PIN MODAL -->
<div class="overlay" id="pinOverlay" style="display:none" onclick="if(event.target===this)closePinModal()">
  <div class="modal" onclick="event.stopPropagation()" style="text-align:center;max-width:360px">
    <div class="modal-title" style="text-align:center">Enter edit PIN</div>
    <div style="font-size:13px;color:#444;margin-bottom:1rem">Only the owner can edit</div>
    <input id="pinInput" type="password" placeholder="Enter PIN" autocomplete="off" style="text-align:center;font-size:16px;letter-spacing:3px" onkeydown="if(event.key==='Enter')checkPin()"/>
    <div class="pin-error" id="pinError"></div>
    <div class="modal-btns" style="margin-top:14px">
      <button class="btn-cancel" onclick="closePinModal()">Cancel</button>
      <button class="btn-save" onclick="checkPin()">Unlock</button>
    </div>
  </div>
</div>

<!-- ADD/EDIT TX MODAL -->
<div class="overlay" id="txOverlay" style="display:none" onclick="if(event.target===this)closeTxModal()">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-title" id="modalTitle">Add transaction</div>
    <div class="type-row">
      <button class="type-btn active-exp" id="btnExp" onclick="setType('expense')">Expense</button>
      <button class="type-btn" id="btnInc" onclick="setType('income')">Income</button>
    </div>
    <div class="form-row"><label>Merchant / Title</label><input id="fTitle" placeholder="e.g. Zepto, Salary..."/></div>
    <div class="form-grid">
      <div><label>Amount (₹)</label><input id="fAmt" type="number" placeholder="0"/></div>
      <div><label>Date</label><input id="fDate" type="date"/></div>
    </div>
    <div class="form-row"><label>Category</label>
      <select id="fCat">
        <option>Food</option><option>Transport</option><option>Shopping</option>
        <option>Entertainment</option><option>Health</option><option>Bills</option>
        <option>Salary</option><option>Freelance</option><option>Transfer</option><option>Other</option>
      </select>
    </div>
    <div class="detail-toggle" onclick="toggleDetail()">
      <span class="detail-arrow" id="detailArrow">▶</span>
      <span class="detail-lbl" id="detailLbl">+ Add detail</span>
    </div>
    <div id="detailBox" style="display:none" class="form-row">
      <label>What exactly did you spend on?</label>
      <textarea id="fDetail" placeholder="e.g. Bought groceries — rice, dal, vegetables..."></textarea>
    </div>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeTxModal()">Cancel</button>
      <button class="btn-save" onclick="saveTx()">Save</button>
    </div>
  </div>
</div>

<script>
const VIEW_PASS = "hellopapa";   // <-- password to VIEW the site
const OWNER_PIN = "246aB";   // <-- PIN to EDIT (can be different)

const MONTHS=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
const CAT_COLORS={Food:"#7F77DD",Transport:"#1D9E75",Shopping:"#D85A30",Entertainment:"#D4537E",Health:"#378ADD",Bills:"#BA7517",Salary:"#639922",Freelance:"#3266ad",Transfer:"#888780",Other:"#5a5a6a"};

let txs=[],filter="All",editId=null,expanded=null,barChart=null,pieChart=null,isOwner=false;

// ---- LOGIN ----
function tryLogin(){
  const v=document.getElementById("viewPassInput").value;
  if(v===VIEW_PASS){
    document.getElementById("loginScreen").style.display="none";
    document.getElementById("dashboard").style.display="block";
    loadData();
  } else {
    document.getElementById("loginError").textContent="Wrong password. Try again.";
    document.getElementById("viewPassInput").value="";
    document.getElementById("viewPassInput").focus();
  }
}
function logout(){
  isOwner=false;
  document.getElementById("dashboard").style.display="none";
  document.getElementById("loginScreen").style.display="flex";
  document.getElementById("viewPassInput").value="";
  document.getElementById("loginError").textContent="";
}

// ---- DATA ----
function loadData(){
  try{const d=localStorage.getItem("fin_txs_v4");txs=d?JSON.parse(d):[];}
  catch{txs=[];}
  render();
}
function save(){try{localStorage.setItem("fin_txs_v4",JSON.stringify(txs));}catch{}}
function fmt(n){return"₹"+Math.abs(n).toLocaleString("en-IN");}

// ---- OWNER MODE ----
function setOwnerMode(on){
  isOwner=on;
  document.getElementById("addBtn").style.display=on?"inline-flex":"none";
  document.getElementById("modeBadge").className="badge "+(on?"edit":"view");
  document.getElementById("modeBadge").textContent=on?"Edit mode":"View only";
  document.getElementById("modeSub").textContent=on?"You can add, edit and delete":"Viewing — read only";
  const lb=document.getElementById("lockBtn");
  lb.className="btn-lock "+(on?"unlocked":"locked");
  lb.textContent=on?"🔓 Lock":"🔒 Unlock";
  renderTxList();
}
function handleLock(){isOwner?setOwnerMode(false):openPinModal();}

// ---- PIN MODAL ----
function openPinModal(){
  document.getElementById("pinInput").value="";
  document.getElementById("pinError").textContent="";
  document.getElementById("pinOverlay").style.display="flex";
  setTimeout(()=>document.getElementById("pinInput").focus(),100);
}
function closePinModal(){document.getElementById("pinOverlay").style.display="none";}
function checkPin(){
  if(document.getElementById("pinInput").value===OWNER_PIN){
    closePinModal();setOwnerMode(true);
  } else {
    document.getElementById("pinError").textContent="Incorrect PIN. Try again.";
    document.getElementById("pinInput").value="";
    document.getElementById("pinInput").focus();
  }
}

// ---- RENDER ----
function render(){
  const inc=txs.filter(t=>t.type==="income").reduce((a,t)=>a+t.amount,0);
  const exp=txs.filter(t=>t.type==="expense").reduce((a,t)=>a+t.amount,0);
  const bal=inc-exp;
  document.getElementById("inc").textContent=fmt(inc);
  document.getElementById("exp").textContent=fmt(exp);
  const bel=document.getElementById("bal");
  bel.textContent=fmt(bal);bel.style.color=bal>=0?"#4ade80":"#f87171";
  renderBarChart();renderPieChart();renderTxList();
}
function renderBarChart(){
  const iD=MONTHS.map((_,i)=>txs.filter(t=>t.type==="income"&&parseInt(t.date.slice(5,7))===i+1).reduce((a,t)=>a+t.amount,0));
  const eD=MONTHS.map((_,i)=>txs.filter(t=>t.type==="expense"&&parseInt(t.date.slice(5,7))===i+1).reduce((a,t)=>a+t.amount,0));
  if(barChart)barChart.destroy();
  barChart=new Chart(document.getElementById("barChart"),{type:"bar",
    data:{labels:MONTHS,datasets:[{label:"Income",data:iD,backgroundColor:"#4ade80",borderRadius:3},{label:"Expenses",data:eD,backgroundColor:"#f87171",borderRadius:3}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>"₹"+c.raw.toLocaleString("en-IN")}}},
      scales:{x:{ticks:{color:"#555",font:{size:11}},grid:{color:"rgba(255,255,255,0.04)"},border:{color:"transparent"}},
              y:{ticks:{color:"#555",font:{size:10},callback:v=>v>=1000?"₹"+(v/1000).toFixed(0)+"k":"₹"+v},grid:{color:"rgba(255,255,255,0.04)"},border:{color:"transparent"}}}}});
}
function renderPieChart(){
  const map={};txs.filter(t=>t.type==="expense").forEach(t=>{map[t.category]=(map[t.category]||0)+t.amount;});
  const entries=Object.entries(map).sort((a,b)=>b[1]-a[1]);
  if(!entries.length){if(pieChart){pieChart.destroy();pieChart=null;}document.getElementById("pieLegend").innerHTML="";return;}
  const labels=entries.map(e=>e[0]),data=entries.map(e=>e[1]),colors=labels.map(l=>CAT_COLORS[l]||"#888");
  if(pieChart)pieChart.destroy();
  pieChart=new Chart(document.getElementById("pieChart"),{type:"doughnut",
    data:{labels,datasets:[{data,backgroundColor:colors,borderColor:"#0d0d0f",borderWidth:2,hoverOffset:4}]},
    options:{responsive:true,maintainAspectRatio:false,cutout:"60%",plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>"₹"+c.raw.toLocaleString("en-IN")}}}}});
  document.getElementById("pieLegend").innerHTML=labels.slice(0,6).map(l=>`<span class="legend-item"><span class="legend-dot" style="background:${CAT_COLORS[l]||'#888'}"></span>${l}</span>`).join("");
}
function renderTxList(){
  const sorted=[...txs].sort((a,b)=>new Date(b.date)-new Date(a.date)||b.id-a.id).filter(t=>filter==="All"||t.type===filter);
  const el=document.getElementById("txList");
  if(!sorted.length){el.innerHTML='<p class="empty">No transactions yet</p>';return;}
  el.innerHTML=sorted.map(t=>`
    <div class="tx-row" onclick="toggleExpand(${t.id})">
      <div class="tx-left">
        <span class="tx-dot" style="background:${t.type==="income"?"#4ade80":"#f87171"}"></span>
        <div>
          <div class="tx-title">${t.title}</div>
          <div class="tx-meta">${t.category} · ${t.date}</div>
          ${expanded===t.id&&t.detail?`<div class="tx-detail-text">"${t.detail}"</div>`:""}
        </div>
      </div>
      <div style="display:flex;align-items:center;gap:6px;flex-shrink:0">
        <span class="tx-amt" style="color:${t.type==="income"?"#4ade80":"#f87171"}">${t.type==="income"?"+":"-"}${fmt(t.amount)}</span>
        ${isOwner?`<button class="btn-icon" onclick="event.stopPropagation();openEdit(${t.id})">Edit</button><button class="btn-icon del" onclick="event.stopPropagation();deleteTx(${t.id})">Del</button>`:""}
      </div>
    </div>`).join("");
}
function toggleExpand(id){expanded=expanded===id?null:id;renderTxList();}
function setFilter(f,el){filter=f;document.querySelectorAll(".chip").forEach(c=>c.classList.remove("active"));el.classList.add("active");renderTxList();}

// ---- TX MODAL ----
let formType="expense";
function setType(t){formType=t;document.getElementById("btnExp").className="type-btn"+(t==="expense"?" active-exp":"");document.getElementById("btnInc").className="type-btn"+(t==="income"?" active-inc":"");}
function toggleDetail(){
  const box=document.getElementById("detailBox"),arr=document.getElementById("detailArrow"),lbl=document.getElementById("detailLbl");
  const open=box.style.display==="none";box.style.display=open?"block":"none";
  arr.className="detail-arrow"+(open?" open":"");lbl.textContent=open?"- Hide detail":"+ Add detail";
}
function openModal(){
  if(!isOwner)return;editId=null;
  document.getElementById("modalTitle").textContent="Add transaction";
  setType("expense");document.getElementById("fTitle").value="";document.getElementById("fAmt").value="";
  document.getElementById("fDate").value=new Date().toISOString().slice(0,10);
  document.getElementById("fCat").value="Food";document.getElementById("fDetail").value="";
  document.getElementById("detailBox").style.display="none";document.getElementById("detailArrow").className="detail-arrow";document.getElementById("detailLbl").textContent="+ Add detail";
  document.getElementById("txOverlay").style.display="flex";
}
function openEdit(id){
  if(!isOwner)return;const t=txs.find(x=>x.id===id);if(!t)return;editId=id;
  document.getElementById("modalTitle").textContent="Edit transaction";setType(t.type);formType=t.type;
  document.getElementById("fTitle").value=t.title;document.getElementById("fAmt").value=t.amount;
  document.getElementById("fDate").value=t.date;document.getElementById("fCat").value=t.category;document.getElementById("fDetail").value=t.detail||"";
  if(t.detail){document.getElementById("detailBox").style.display="block";document.getElementById("detailArrow").className="detail-arrow open";document.getElementById("detailLbl").textContent="- Hide detail";}
  else{document.getElementById("detailBox").style.display="none";document.getElementById("detailArrow").className="detail-arrow";document.getElementById("detailLbl").textContent="+ Add detail";}
  document.getElementById("txOverlay").style.display="flex";
}
function closeTxModal(){document.getElementById("txOverlay").style.display="none";editId=null;}
function saveTx(){
  const title=document.getElementById("fTitle").value.trim(),amt=parseFloat(document.getElementById("fAmt").value);
  if(!title||isNaN(amt)||amt<=0)return;
  const tx={id:editId||Date.now(),type:formType,amount:amt,category:document.getElementById("fCat").value,
            date:document.getElementById("fDate").value,title,detail:document.getElementById("fDetail").value.trim()};
  if(editId){txs=txs.map(t=>t.id===editId?tx:t);}else{txs=[...txs,tx];}
  save();closeTxModal();render();
}
function deleteTx(id){if(!isOwner)return;if(confirm("Delete this transaction?")){txs=txs.filter(t=>t.id!==id);save();render();}}
</script>
</body>
</html>
